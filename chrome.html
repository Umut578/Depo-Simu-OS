<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome Simulator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #202124;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* Tarayıcı Pencere Kapsayıcısı */
        .chrome-browser {
            width: 100%;
            max-width: 1000px;
            height: 80vh;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #3c4043;
        }

        /* Üst Bar (Sekmeler Alanı) */
        .chrome-header {
            background-color: #2f3136;
            padding: 8px 8px 0 8px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .chrome-tabs {
            display: flex;
            align-items: flex-end;
        }

        .tab {
            background-color: #202124;
            color: #9aa0a6;
            padding: 8px 16px;
            border-radius: 8px 8px 0 0;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            max-width: 160px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab.active {
            background-color: #35363a;
            color: #fff;
        }

        .tab .close-tab {
            font-size: 10px;
            border-radius: 50%;
            width: 14px;
            height: 14px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        .tab .close-tab:hover {
            background-color: #5f6368;
        }

        .new-tab-btn {
            background: none;
            border: none;
            color: #9aa0a6;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            margin-bottom: 4px;
            border-radius: 50%;
        }

        .new-tab-btn:hover {
            background-color: #3c4043;
            color: #fff;
        }

        /* Navigasyon ve URL Bar Alanı */
        .chrome-nav-bar {
            background-color: #35363a;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #202124;
        }

        .nav-buttons {
            display: flex;
            gap: 8px;
            color: #9aa0a6;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #e8eaed;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 28px;
            height: 28px;
        }

        .nav-btn:hover {
            background-color: #4a4d51;
        }

        .url-bar-container {
            flex-grow: 1;
        }

        .url-bar {
            width: 100%;
            background-color: #202124;
            border: none;
            border-radius: 30px;
            padding: 6px 16px;
            color: #e8eaed;
            font-size: 14px;
            outline: none;
            border: 2px solid transparent;
        }

        .url-bar:focus {
            border-color: #8ab4f8;
            background-color: #282a2d;
        }

        /* Web İçerik Alanı */
        .chrome-content {
            flex-grow: 1;
            background-color: #fff;
            position: relative;
        }

        .chrome-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="chrome-browser">
        <div class="chrome-header">
            <div class="chrome-tabs">
                <div class="tab active">
                    <span>Google</span>
                    <span class="close-tab">×</span>
                </div>
            </div>
            <button class="new-tab-btn">+</button>
        </div>

        <div class="chrome-nav-bar">
            <div class="nav-buttons">
                <button class="nav-btn" onclick="goBack()">⟵</button>
                <button class="nav-btn" onclick="goForward()">⟶</button>
                <button class="nav-btn" onclick="reloadIframe()">⟳</button>
            </div>
            <div class="url-bar-container">
                <input type="text" class="url-bar" id="urlInput" value="https://www.bing.com" onkeydown="handleUrlKey(event)">
            </div>
        </div>

        <div class="chrome-content">
            <iframe id="browserIframe" src="https://www.bing.com"></iframe>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('browserIframe');
        const urlInput = document.getElementById('urlInput');

        // Adres çubuğunda Enter'a basınca sayfayı yükle
        function handleUrlKey(event) {
            if (event.key === 'Enter') {
                let url = urlInput.value.trim();
                
                // HTTP/HTTPS kontrolü ve otomatik ekleme
                if (!/^https?:\/\//i.test(url)) {
                    url = 'https://' + url;
                }
                
                urlInput.value = url;
                iframe.src = url;
            }
        }

        // Yenileme Butonu
        function reloadIframe() {
            iframe.src = iframe.src;
        }

        // Geri ve İleri butonları simülasyonu (Aynı domain içinde çalışır)
        function goBack() {
            try {
                window.history.back();
            } catch (e) {
                console.log("Iframe içi geçmişe erişilemedi (X-Frame-Options engeli).");
            }
        }

        function goForward() {
            try {
                window.history.forward();
            } catch (e) {
                console.log("Iframe içi geçmişe erişilemedi.");
            }
        }
    </script>
</body>
</html>
